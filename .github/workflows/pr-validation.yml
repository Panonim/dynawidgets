name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-validation:
    name: Check targeting -> Check Widgets/ Changed -> Validate
    runs-on: actions_linux
    if: "!(github.base_ref == 'main' && github.head_ref == 'testing')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check targeting
        if: github.base_ref != 'testing'
        run: |
          echo "target_branch_failed=true" >> $GITHUB_ENV
          exit 1

      - uses: actions/github-script@v7
        if: failure() && env.target_branch_failed == 'true'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **PR Validation Failed**\n\nPR must target the `testing` branch.'
            })

      - name: Check Widgets/ Changed
        id: check_files
        run: |
          changed=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD)
          echo "Changed files:"
          echo "$changed"

          invalid=$(echo "$changed" | grep -v '^widgets/' | grep -v '^\s*$' || true)
          if [ -n "$invalid" ]; then
            echo "invalid_files<<EOF" >> $GITHUB_OUTPUT
            echo "$invalid" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 1
          fi

      - uses: actions/github-script@v7
        if: failure() && steps.check_files.outputs.invalid_files
        with:
          script: |
            const invalidFiles = `${{ steps.check_files.outputs.invalid_files }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **PR Validation Failed**\n\nOnly files under \`widgets/\` may be changed in a PR.\n\nThe following files are not allowed:\n\`\`\`\n${invalidFiles}\n\`\`\``
            })

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate
        id: validate
        run: |
          npm ci
          node scripts/validate-widgets.js > validation.txt 2>&1 || {
            cat validation.txt
            exit 1
          }

      - uses: actions/github-script@v7
        if: failure() && steps.validate.outcome == 'failure'
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('validation.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Widget Validation Failed**\n\n\`\`\`\n${output}\n\`\`\``
            })
